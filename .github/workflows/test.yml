name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest typer websockets mcp
          pip install -e cli/

      - name: Run cli/tests
        run: pytest cli/tests/ -v

      - name: Run tests/test_mcp_server.py
        run: pytest tests/test_mcp_server.py -v

  go:
    name: Go (build)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build spectator TUI
        run: go build -o /tmp/spectator ./...
        working-directory: tui

      - name: Build play TUI
        run: go build -o /tmp/play ./...
        working-directory: tui/play
